<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Drive Hive</title>
    <link rel="stylesheet" href="css/user-settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <img src="images/DriveHivelogo.png" alt="Drive Hive Logo" class="logo">
            <h2 class="sidebar-title">DRIVE HIVE</h2>
            <ul class="nav-links">
                <li class="nav-item" id="dashboard">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </li>
                <li class="nav-item" id="Viewmap">
                    <i class="fas fa-map-marker-alt"></i> <span>Map</span>
                </li>
                <li class="nav-item" id="transhis">
                    <i class="fas fa-calendar-check"></i> <span>Transaction History</span>
                </li>
                <li class="nav-item" id="notif">
                    <i class="fas fa-bell"></i> <span>Notifications</span>
                </li>
                <li class="nav-item active" id="set">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </li>
            </ul>
            <div class="sidebar-profile">
                <div class="avatar">US</div>
                <div class="profile-details">
                    <span class="name">User Portal</span>
                    <span class="role">Verified Driver</span>
                </div>
            </div>
            <button id="logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="settings-container">
                <h1 class="settings-title">User Settings</h1>
                
                <div class="settings-card">
                    <!-- Loading State -->
                    <div id="loadingIndicator" class="loading-indicator">
                        <i class="fas fa-spinner fa-spin"></i> Loading account configuration...
                    </div>
                    
                    <!-- Settings Form Fields -->
                    <div id="userContent" style="display: none;">
                        <div class="settings-header">
                            <div class="profile-picture">
                                <img id="userPicture" src="default-avatar.jpg" alt="Profile Picture">
                                <div class="picture-upload">
                                    <input type="file" id="pictureUpload" accept="image/*" style="display: none;">
                                    <button id="changePictureBtn">
                                        <i class="fas fa-camera"></i> Change Picture
                                    </button>
                                </div>
                            </div>
                            <div class="profile-info">
                                <h2 id="userFullName">Loading Name...</h2>
                                <p id="userEmail">Loading Email...</p>
                                <div class="verification-badge">
                                    <i class="fas fa-check-circle verified-icon"></i>
                                    <span id="verificationText">Loading verification...</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="settings-form">
                            <h3>Personal Information</h3>
                            <form id="userSettingsForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="firstName">First Name</label>
                                        <input type="text" id="firstName" required placeholder="First Name">
                                    </div>
                                    <div class="form-group">
                                        <label for="lastName">Last Name</label>
                                        <input type="text" id="lastName" required placeholder="Last Name">
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="email">Email Address</label>
                                    <input type="email" id="email" required placeholder="Email Address" readonly>
                                </div>
                                
                                <div class="form-group">
                                    <label for="phoneNumber">Phone Number</label>
                                    <input type="tel" id="phoneNumber" required placeholder="Phone Number">
                                </div>
                                
                                <h3>Driver's License Details</h3>
                                <div class="form-group">
                                    <label for="licenseNumber">License Number</label>
                                    <input type="text" id="licenseNumber" placeholder="License Number">
                                </div>
                                
                                <div class="license-preview">
                                    <label>License Document Image</label>
                                    <div class="license-image-container">
                                        <img id="licenseImagePreview" src="" alt="Driver's License" style="display: none;">
                                        <div class="license-upload">
                                            <input type="file" id="licenseUpload" accept="image/*" style="display: none;">
                                            <button type="button" id="changeLicenseBtn">
                                                <i class="fas fa-upload"></i> Upload New License
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                <h3>Update Password</h3>
                                <div class="form-group">
                                    <label for="currentPassword">Current Password</label>
                                    <input type="password" id="currentPassword" placeholder="Enter current password to make changes">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="newPassword">New Password</label>
                                        <input type="password" id="newPassword" placeholder="Enter new password">
                                    </div>
                                    <div class="form-group">
                                        <label for="confirmPassword">Confirm Password</label>
                                        <input type="password" id="confirmPassword" placeholder="Confirm new password">
                                    </div>
                                </div>
                                
                                <div class="form-actions">
                                    <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                                    <button type="submit" id="saveChangesBtn" class="btn-primary">
                                        <i class="fas fa-save"></i> Save Settings
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK compatibility -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script type="module" src="js/user-settings.js"></script> 
</body>
</html>

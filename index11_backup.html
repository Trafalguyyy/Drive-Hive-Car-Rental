}
async function addCityBoundary(lat, lng, isDestination = false) {
    try {
        // Create a temporary layer group for the new boundary
        const tempBoundaryLayer = L.layerGroup();
        
        // First get city information using Nominatim
        const nominatimResponse = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`
        );
        const nominatimData = await nominatimResponse.json();
        
        const cityName = nominatimData.address.city || nominatimData.address.town || 
                        nominatimData.address.village || (isDestination ? "Destination" : "Current Location");
        
        // Search for the city's administrative boundary using Nominatim search
        const searchResponse = await fetch(
            `https://nominatim.openstreetmap.org/search?city=${encodeURIComponent(cityName)}&format=json&polygon_geojson=1&type=administrative`
        );
        const searchData = await searchResponse.json();

        if (searchData && searchData.length > 0) {
            const cityBoundary = searchData[0];
            
            if (cityBoundary.geojson) {
                L.geoJSON(cityBoundary.geojson, {
                    style: {
                        color: isDestination ? '#ff4444' : '#3388ff',
                        weight: 3,
                        opacity: 0.7,
                        fillOpacity: 0.1,
                        fillColor: isDestination ? '#ff4444' : '#3388ff'
                    }
                }).addTo(tempBoundaryLayer);
            }
        } else {
            // Fallback to Overpass API
            const overpassQuery = `
                [out:json];
                (
                    relation["boundary"="administrative"]["admin_level"="8"]["name"="${cityName}"];
                    way["boundary"="administrative"]["admin_level"="8"]["name"="${cityName}"];
                );
                (._;>;);
                out body;
            `;
            
            const overpassResponse = await fetch(
                `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`
            );
            const overpassData = await overpassResponse.json();

            if (overpassData.elements && overpassData.elements.length > 0) {
                const boundaryElements = overpassData.elements.filter(el => 
                    (el.type === 'relation' || el.type === 'way') && 
                    el.tags && 
                    el.tags.boundary === 'administrative'
                );

                boundaryElements.forEach(element => {
                    if (element.type === 'relation') {
                        const members = overpassData.elements.filter(el => 
                            element.members.some(m => m.type === el.type && m.ref === el.id)
                        );
                        
                        members.forEach(member => {
                            if (member.type === 'way') {
                                const nodes = overpassData.elements.filter(el => 
                                    el.type === 'node' && member.nodes.includes(el.id)
                                );
                                const coords = nodes.map(node => [node.lat, node.lon]);
                                if (coords.length >= 3) {
                                    L.polygon(coords, {
                                        color: isDestination ? '#ff4444' : '#3388ff',
                                        weight: 3,
                                        opacity: 0.7,
                                        fillOpacity: 0.1,
                                        fillColor: isDestination ? '#ff4444' : '#3388ff'
                                    }).addTo(tempBoundaryLayer);
                                }
                            }
                        });
                    } else if (element.type === 'way') {
                        const nodes = overpassData.elements.filter(el => 
                            el.type === 'node' && element.nodes.includes(el.id)
                        );
                        const coords = nodes.map(node => [node.lat, node.lon]);
                        if (coords.length >= 3) {
                            L.polygon(coords, {
                                color: isDestination ? '#ff4444' : '#3388ff',
                                weight: 3,
                                opacity: 0.7,
                                fillOpacity: 0.1,
                                fillColor: isDestination ? '#ff4444' : '#3388ff'
                            }).addTo(tempBoundaryLayer);
                        }
                    }
                });
            }
        }

        // If we didn't find any boundary data, use a circle as fallback
        if (tempBoundaryLayer.getLayers().length === 0) {
            L.circle([lat, lng], {
                radius: 5000,
                color: isDestination ? '#ff4444' : '#3388ff',
                weight: 3,
                opacity: 0.7,
                fillOpacity: 0.1,
                fillColor: isDestination ? '#ff4444' : '#3388ff'
            }).addTo(tempBoundaryLayer);
        }

        // For destination boundary, store it separately
        if (isDestination) {
            if (destinationBoundaryLayer) {
                map.removeLayer(destinationBoundaryLayer);
            }
            destinationBoundaryLayer = tempBoundaryLayer;
            destinationBoundaryLayer.addTo(map);
        } else {
            // For current location boundary (if needed)
            if (window.cityBoundaryLayer) {
                map.removeLayer(window.cityBoundaryLayer);
            }
            window.cityBoundaryLayer = tempBoundaryLayer;
            window.cityBoundaryLayer.addTo(map);
        }

    } catch (error) {
        console.error("Error fetching boundary:", error);
        // Fallback to simple circle if everything fails
        if (isDestination) {
            if (destinationBoundaryLayer) {
                map.removeLayer(destinationBoundaryLayer);
            }
            destinationBoundaryLayer = L.circle([lat, lng], {
                radius: 5000,
                color: '#ff4444',
                weight: 3,
                opacity: 0.7,
                fillOpacity: 0.1,
                fillColor: '#ff4444'
            }).addTo(map);
        } else {
            if (window.cityBoundaryLayer) {
                map.removeLayer(window.cityBoundaryLayer);
            }
            window.cityBoundaryLayer = L.circle([lat, lng], {
                radius: 5000,
                color: '#3388ff',
                weight: 3,
                opacity: 0.7,
                fillOpacity: 0.1,
                fillColor: '#3388ff'
            }).addTo(map);
        }
    }
}



        
        // Debounce function to prevent multiple rapid clicks
        function debounce(func, timeout = 2000) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { 
                    func.apply(this, args); 
                }, timeout);
            };
        }

        async function handleGoingBack() {
            const goingBackBtn = document.getElementById("goingBackBtn");
            goingBackBtn.disabled = true;
            goingBackBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            // Add confirmation dialog
            const confirmed = confirm("Are you sure you want to end this trip and proceed to payment?");
            if (!confirmed) {
                goingBackBtn.disabled = false;
                goingBackBtn.innerHTML = 'Going Back';
                return;
            }

            // Get the final fee
            const finalFee = parseFloat(document.getElementById("fee").textContent.replace("₱", ""));
            if (finalFee < 1 || baseFee === 0) {
                showModal("No valid booking data found.");
                goingBackBtn.disabled = false;
                goingBackBtn.innerHTML = 'Going Back';
                return;
            }

            try {
                // Get the logged-in user from localStorage
                const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
                if (!loggedInUser || !loggedInUser.userId) {
                    showModal("User not logged in or missing user ID.");
                    return;
                }

                const userId = loggedInUser.userId || '';
                const email = loggedInUser.email || '';
                const firstname = loggedInUser.firstname || '';

                // Get booking data
                const bookingRef = database.ref(`active-bookings/${currentBookingId}`);
                const bookingSnapshot = await bookingRef.once('value');
                const bookingData = bookingSnapshot.val();

                if (!bookingData) {
                    showModal("Booking data not found.");
                    return;
                }

                // Get car details
                const carDetails = bookingData.car || {};
                
                // Prepare the bill data
                const billData = {
                    userInfo: { userId, email, firstname },
                    bookingInfo: {
                        bookingId: currentBookingId,
                        bookingDate: bookingData.bookingDate || '',
                        bookingDateTime: bookingData.bookingDateTime || '',
                        bookingTime: bookingData.bookingTime || '',
                        fromLocation: bookingData.fromLocation || '',
                        toLocation: bookingData.toLocation || '',
                        booking_status: 'completed',
                        originalTimestamp: bookingData.timestamp || new Date().toISOString()
                    },
                    carInfo: {
                        carModel: carDetails.carModel || '',
                        carName: carDetails.carName || '',
                        carYear: carDetails.carYear || '',
                        licensePlate: carDetails.licensePlate || '',
                        numSeats: carDetails.numSeats || '',
                        gpsId: carDetails.gps_id || ''
                    },
                    paymentInfo: {
                        finalFee,
                        paymentDate: new Date().toISOString(),
                        paymentStatus: "completed"
                    }
                };

                // Generate a unique bill ID
                const billId = `bill_${currentBookingId}_${Date.now()}`;
                
                // Use update() to write to specific paths
                const updates = {};
                updates[`Transactionhistory/${billId}`] = billData;
                updates[`active-bookings/${currentBookingId}/booking_status`] = 'completed';
                
                // Perform the update
                await database.ref().update(updates);

                console.log("Bill created and booking marked as completed!");

function isPointInBoundary(point, boundaryLayer) {
    if (!boundaryLayer || !point) return true; // Default to inside if boundary not loaded
    
    let inside = false;
    let layersProcessed = 0;
    
    boundaryLayer.eachLayer(function(layer) {
        try {
            layersProcessed++;
            if (L.Polygon && layer instanceof L.Polygon) {
                const latlngs = layer.getLatLngs();
                
                // Handle both simple polygons and multipolygons
                if (Array.isArray(latlngs[0])) {
                    // Multipolygon - check each polygon
                    latlngs.forEach(polygon => {
                        if (L.PolyUtil.pointInPolygon(point, polygon)) {
                            inside = true;
                        }
                    });
                } else {
                    // Simple polygon
                    if (L.PolyUtil.pointInPolygon(point, latlngs)) {
                        inside = true;
                    }
                }
            } 
            else if (L.Circle && layer instanceof L.Circle) {
                const center = layer.getLatLng();
                const radius = layer.getRadius();
                if (center.distanceTo(point) <= radius) {
                    inside = true;
                }
            }
        } catch (e) {
            console.error("Error checking point in boundary:", e);
        }
    });
    
    // If we didn't process any layers, assume we're inside
    return layersProcessed > 0 ? inside : true;
}



function calculateDistanceToBoundary(point, boundaryLayer) {
    if (!boundaryLayer || !point) return 0;
    
    let minDistance = Infinity;
    let layersProcessed = 0;
    
    boundaryLayer.eachLayer(function(layer) {
        try {
            layersProcessed++;
            if (L.Polygon && layer instanceof L.Polygon) {
                const latlngs = layer.getLatLngs();
                
                // Handle both simple and multi polygons
                const polygons = Array.isArray(latlngs[0]) ? latlngs : [latlngs];
                
                polygons.forEach(polygon => {
                    // First check if point is inside this polygon
                    if (L.PolyUtil.pointInPolygon(point, polygon)) {
                        minDistance = 0;
                        return;
                    }
                    
                    // If outside, calculate distance to nearest edge
                    for (let i = 0; i < polygon.length; i++) {
                        const start = polygon[i];
                        const end = polygon[(i + 1) % polygon.length];
                        const segmentDistance = L.LineUtil.pointToSegmentDistance(
                            point, start, end
                        );
                        if (segmentDistance < minDistance) {
                            minDistance = segmentDistance;
                        }
                    }
                });
            } 
            else if (L.Circle && layer instanceof L.Circle) {
                const center = layer.getLatLng();
                const radius = layer.getRadius();
                const distance = center.distanceTo(point) - radius;
                if (distance < minDistance) minDistance = distance;
            }
        } catch (e) {
            console.error("Error calculating layer distance:", e);
        }
    });
    
    // If no layers processed or still Infinity, return 0
    if (layersProcessed === 0 || !isFinite(minDistance)) {
        return 0;
    }
    
    // Convert meters to kilometers and ensure non-negative
    return Math.max(0, minDistance / 1000);
}









        async function sendExceedNotificationToAdmin(currentLat, currentLng, distanceBeyond) {
            try {
                if (!currentBookingId) return;

                const bookingRef = database.ref(`active-bookings/${currentBookingId}`);
                const bookingSnapshot = await bookingRef.once('value');
                const bookingData = bookingSnapshot.val();

                if (!bookingData) {
                    console.error("No booking data found");
                    return;
                }

                const notificationRef = database.ref('messages/admin_notifications').push();
                await notificationRef.set({
                    bookingId: currentBookingId,
                    userId: bookingData.userId,
                    userName: bookingData.fullName || 'Unknown User',
                    carName: bookingData.car?.carName || 'Unknown Car',
                    originalToLocation: bookingData.toLocation,
                    currentLocation: `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`,
                    distanceBeyond: distanceBeyond.toFixed(2),
                    timestamp: Date.now(),
                    status: "unread",
                    notified: false
                });

                console.log("Admin notification sent for exceeded destination");
                await bookingRef.update({ exceedNotificationSent: true });

            } catch (error) {
                console.error("Error sending exceed notification to admin:", error);
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function getCoordinates(address, callback) {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${address}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        callback([parseFloat(data[0].lat), parseFloat(data[0].lon)]);
                    } else {
                        console.error("Address not found:", address);
                    }
                })
                .catch(error => console.error("Error fetching coordinates:", error));
        }

<!DOCTYPE html>
<html>

<head>
    <title>City Boundary Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 500px;
            width: 100%;
            margin-top: 10px;
        }

        #controls {
            padding: 10px;
            background: #f4f4f4;
        }
    </style>
</head>

<body>
    <div id="controls">
        <input type="text" id="addressInput" placeholder="Enter municipality or city"
            style="width: 250px; padding: 5px;" />
        <button id="pinButton" style="padding: 5px 10px;">Show City Boundary</button>
    </div>
    <div id="map"></div>

    <script>
        // Initialize Leaflet map
        const map = L.map('map').setView([7.1907, 125.4553], 10); // Default center: Davao City
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let boundaryLayer;

        async function getCityBoundary(address) {
            const searchUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&polygon_geojson=1`;
            try {
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data.length > 0 && data[0].geojson) {
                    const geojson = data[0].geojson;

                    // Remove previous boundary if exists
                    if (boundaryLayer) {
                        map.removeLayer(boundaryLayer);
                    }

                    // Add new boundary layer
                    boundaryLayer = L.geoJSON(geojson, {
                        style: {
                            color: 'blue',
                            weight: 2,
                            fillOpacity: 0.1
                        }
                    }).addTo(map);

                    map.fitBounds(boundaryLayer.getBounds());
                } else {
                    alert("City or municipality not found or has no boundary data!");
                }
            } catch (error) {
                console.error("Error fetching boundary data:", error);
                alert("An error occurred while fetching boundary data.");
            }
        }

        document.getElementById('pinButton').addEventListener('click', function () {
            const address = document.getElementById('addressInput').value.trim();
            if (address) {
                getCityBoundary(address);
            } else {
                alert("Please enter a city or municipality name.");
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Car | Drive Hive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://unpkg.com/osmtogeojson@3.0.0/dist/osmtogeojson.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .main-content {
            display: flex;
            flex-direction: row;
            padding: 0 !important;
            height: 100vh;
            overflow: hidden;
        }

        .car-list {
            width: 320px;
            background: var(--dh-white);
            border-right: 1px solid var(--dh-border);
            display: flex;
            flex-direction: column;
            padding: var(--space-md);
            overflow-y: auto;
            z-index: 10;
        }

        .car-list h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dh-dark);
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .car-card {
            background: var(--dh-bg);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--dh-border);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .car-card:hover {
            transform: translateY(-2px);
            border-color: var(--dh-red);
            box-shadow: var(--shadow-sm);
        }

        .car-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--dh-dark);
            margin-bottom: 4px;
        }

        .car-card p {
            font-size: 0.8rem;
            color: var(--dh-text-muted);
            margin-bottom: 2px;
        }

        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        .car-details-panel {
            position: absolute;
            bottom: 24px;
            left: calc(var(--sidebar-width) + 340px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--dh-border);
            z-index: 1000;
            width: 300px;
            display: none;
            transition: all var(--transition-base);
        }

        .car-details-panel h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--dh-dark);
            margin-bottom: var(--space-sm);
        }

        .car-details-panel p {
            font-size: 0.8rem;
            color: var(--dh-text-muted);
            margin-bottom: 4px;
        }

        @media (max-width: 1024px) {
            .car-details-panel {
                left: calc(var(--sidebar-collapsed) + 340px);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                height: calc(100vh - 70px);
            }

            .car-list {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--dh-border);
            }

            .car-details-panel {
                left: 20px;
                bottom: 20px;
                width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <img src="DriveHivelogo.png" alt="Drive Hive Logo" class="logo">
            <h2 class="sidebar-title">DRIVE HIVE</h2>
            <ul class="nav-links">
                <li class="nav-item" id="dashboard">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </li>
                <li class="nav-item active" id="track-cars">
                    <i class="fas fa-map-marker-alt"></i> <span>Track Cars</span>
                </li>
                <li class="nav-item" id="bookings">
                    <i class="fas fa-calendar-check"></i> <span>Bookings</span>
                </li>
                <li class="nav-item" id="cars">
                    <i class="fas fa-car"></i> <span>Cars</span>
                </li>
                <li class="nav-item" id="users">
                    <i class="fas fa-users"></i> <span>Users</span>
                </li>
                <li class="nav-item" id="settings">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </li>
            </ul>
            <div class="sidebar-profile">
                <div class="avatar">AD</div>
                <div class="profile-details">
                    <span class="name">Admin User</span>
                    <span class="role">System Manager</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="car-list" id="carList">
                <h2><i class="fas fa-car-side"></i> Active Vehicles</h2>
                <!-- Car cards will be dynamically inserted here -->
            </div>
            <div id="map"></div>
            <div class="car-details-panel" id="carDetailsPanel">
                <h3 id="carDetailsName"></h3>
                <p id="carDetailsModel"></p>
                <p id="carDetailsLocation"></p>
                <p id="carDetailsStatus"></p>
                <p id="carDetailsSpeed"></p>
                <p id="carDetailsLastUpdate"></p>
            </div>
        </div>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBamJPyOALkoj5NyFWDMnpxijkK7iT5FHM",
            authDomain: "drivehive-dbe9b.firebaseapp.com",
            databaseURL: "https://drivehive-dbe9b-default-rtdb.firebaseio.com",
            projectId: "drivehive-dbe9b",
            storageBucket: "drivehive-dbe9b.firebasestorage.app",
            messagingSenderId: "582305437761",
            appId: "1:582305437761:web:0cd72a831664da4b018ec0",
            measurementId: "G-YQ7H98NGVQ"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Initialize the map
        const map = L.map('map').setView([14.5995, 120.9842], 12); // Default to Manila
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Custom car icon
        const carIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -20]
        });

        // Destination icon
        const destinationIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/447/447031.png',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        // Drive Hive Office - fixed pickup location
        const DRIVE_HIVE_OFFICE = [7.0499902, 125.5730382];
        const BOUNDARY_PADDING = 300; // meters of padding around the midpoint circle

        // Pickup (Drive Hive Office) Icon
        const pickupIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -36]
        });

        // Place the fixed Drive Hive Office pickup marker
        pickupMarker = L.marker(DRIVE_HIVE_OFFICE, { icon: pickupIcon }).addTo(map);
        pickupMarker.bindPopup("<b>Drive Hive Office</b><br>Pickup Point");
        // Marker for the selected car
        let carMarker = null;
        let currentCar = null;
        let currentBooking = null;
        let gpsListener = null;
        let destinationLayer = null;
        let destinationMarker = null;
        let routeLine = null;
        let boundaryCircle = null;
        let lastBoundaryData = {
            cityName: null,
            cityLat: null,
            cityLng: null
        };

        function fetchCars() {
            const activeBookingsRef = database.ref('active-bookings');
            activeBookingsRef.on('value', (snapshot) => {
                const carList = document.getElementById("carList");
                carList.innerHTML = "<h2>🚗 Cars</h2>";

                snapshot.forEach((childSnapshot) => {
                    const booking = childSnapshot.val();
                    const car = booking.car;
                    
                    if (car) {
                        const carCard = document.createElement("div");
                        carCard.className = "car-card";
                        carCard.innerHTML = `
                            <div style="display: flex; align-items: center;">
                                <img src="${car.image}" alt="${car.carName}" style="width: 50px; height: 50px; border-radius: 8px; margin-right: 10px;">
                                <div>
                                    <h3>${car.carName}</h3>
                                    <p>Model: ${car.carModel}</p>
                                    <p>Year: ${car.carYear}</p>
                                    <p>Seats: ${car.numSeats}</p>
                                    <p>Price: ₱${car.rentalPrice}</p>
                                    <p>Status: <span style="color: ${car.status === 'active' ? 'green' : 'red'};">${car.status}</span></p>
                                    <p>To: ${booking.toLocation}</p>
                                </div>
                            </div>
                        `;
                        
                        carCard.addEventListener("click", () => {
                            // Remove previous selection highlight
                            document.querySelectorAll('.car-card').forEach(card => {
                                card.style.border = 'none';
                            });
                            // Highlight selected car
                            carCard.style.border = '2px solid #ff3434';
                            
                            // Store current booking
                            currentBooking = booking;
                            fetchGPSData(car.gps_id, car);
                        });
                        carList.appendChild(carCard);
                    }
                });
            }, (error) => {
                console.error("Error fetching cars: ", error);
            });
        }

        // Fetch GPS data for the selected car
        function fetchGPSData(gpsId, car) {
            // Remove previous listener if exists
            if (gpsListener) {
                database.ref('gps_data').off('value', gpsListener);
            }
            
            currentCar = car;
            const gpsRef = database.ref('gps_data').orderByChild('gps_id').equalTo(gpsId).limitToLast(1);
            
            gpsListener = gpsRef.on('value', (snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const gpsData = childSnapshot.val();
                        displayCarOnMap(car, gpsData);
                        
                        // If we have a booking with destination, show its boundary
                        if (currentBooking && currentBooking.toLocation) {
                            updateRouteDisplay(currentBooking.toLocation);
                        }
                    });
                } else {
                    console.error("No GPS data found for GPS ID: ", gpsId);
                }
            }, (error) => {
                console.error("Error fetching GPS data: ", error);
            });
        }

        // Display the selected car on the map
        function displayCarOnMap(car, gpsData) {
            const { latitude, longitude, speed, timestamp } = gpsData;
            const { carName, carModel } = car;
            
            // Remove previous marker if exists
            if (carMarker) map.removeLayer(carMarker);

            // Create popup content
            let popupContent = `
                <b>${carName}</b><br>
                ${carModel}<br>
                Speed: ${speed || 0} km/h<br>
                Last update: ${formatTime(timestamp)}<br>
            `;
            
            // Add destination if available
            if (currentBooking?.toLocation) {
                popupContent += `Destination: ${currentBooking.toLocation}`;
            }

            // Add new marker
            carMarker = L.marker([latitude, longitude], { 
                icon: carIcon,
                rotationAngle: getRandomBearing()
            }).addTo(map).bindPopup(popupContent);

            // Center map on car with some padding

            map.setView([latitude, longitude], 15);
            
            // Update car details panel
           
        }

        // Fetch city boundary from Overpass API

        // Display pickup + destination markers, polyline, and enclosing circle
        function updateRouteDisplay(destAddress) {
            // If no destination, just remove old layers
            if (!destAddress) {
                if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }
                if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
                if (boundaryCircle) { map.removeLayer(boundaryCircle); boundaryCircle = null; }
                return;
            }

            // Geocode the destination address
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destAddress)}&limit=1`)
                .then(response => response.json())
                .then(data => {
                    if (!data || data.length === 0) return;

                    const destCoords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];

                    // Remove old layers
                    if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }
                    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
                    if (boundaryCircle) { map.removeLayer(boundaryCircle); boundaryCircle = null; }

                    // Place destination marker
                    destinationMarker = L.marker(destCoords, { icon: destinationIcon }).addTo(map);
                    destinationMarker.bindPopup("<b>Destination</b><br>" + destAddress);

                    // Draw polyline from Drive Hive office to destination
                    routeLine = L.polyline([DRIVE_HIVE_OFFICE, destCoords], {
                        color: '#007bff',
                        weight: 4,
                        opacity: 0.7,
                        dashArray: '10, 10'
                    }).addTo(map);

                    // Calculate geographic midpoint
                    const midLat = (DRIVE_HIVE_OFFICE[0] + destCoords[0]) / 2;
                    const midLng = (DRIVE_HIVE_OFFICE[1] + destCoords[1]) / 2;
                    const midpoint = [midLat, midLng];

                    // Calculate distance using Leaflet
                    const distMeters = L.latLng(DRIVE_HIVE_OFFICE[0], DRIVE_HIVE_OFFICE[1])
                        .distanceTo(L.latLng(destCoords[0], destCoords[1]));

                    // Circle radius = half distance + padding
                    const circleRadius = (distMeters / 2) + BOUNDARY_PADDING;

                    // Create the enclosing circle
                    boundaryCircle = L.circle(midpoint, {
                        radius: circleRadius,
                        color: '#ff4444',
                        weight: 2,
                        opacity: 0.6,
                        fillColor: '#ff4444',
                        fillOpacity: 0.08
                    }).addTo(map);

                    // Fit map to show the entire circle
                    map.fitBounds(boundaryCircle.getBounds(), { padding: [30, 30] });
                })
                .catch(err => console.error("Geocoding error:", err));
        }

        // Update the car details panel
        function updateCarDetailsPanel(car, gpsData) {
            const panel = document.getElementById('carDetailsPanel');
            const { carName, carModel, status } = car;
            const { latitude, longitude, speed, timestamp } = gpsData;
            
            document.getElementById('carDetailsName').textContent = carName;
            document.getElementById('carDetailsModel').textContent = `Model: ${carModel}`;
            document.getElementById('carDetailsLocation').textContent = `Location: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
            document.getElementById('carDetailsStatus').innerHTML = `Status: <span style="color: ${status === 'active' ? 'green' : 'red'}">${status}</span>`;
            document.getElementById('carDetailsSpeed').textContent = `Speed: ${speed || 0} km/h`;
            document.getElementById('carDetailsLastUpdate').textContent = `Last update: ${formatTime(timestamp)}`;
            
            panel.style.display = 'block';
        }

        // Helper function to format timestamp
        function formatTime(timestamp) {
            if (!timestamp) return 'Unknown';
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        // Helper function to generate random bearing (for marker rotation)
        function getRandomBearing() {
            return Math.floor(Math.random() * 360);
        }

        // Initialize the app
        function init() {
            fetchCars();
            
            // Set up a timer to periodically update the selected car's position
            setInterval(() => {
                if (currentCar) {
                    fetchGPSData(currentCar.gps_id, currentCar);
                }
            }, 5000); // Update every 5 seconds
        }

        // Run the app
        document.addEventListener("DOMContentLoaded", init);
    </script>
      <script type="module" src="dashboard.js"></script>
</body>
</html>

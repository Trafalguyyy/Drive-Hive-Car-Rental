            height: 100%; /* Map takes full height of main content */
             width: 70%;
            margin-left: 25%; /* Map takes full width of main content */
             border-radius: 20px; /* Add rounded corners */
            overflow: hidden; /* Ensure the map doesn't overflow the rounded corners */
        }
    </style>
</head>

    <div class="container">

     <div class="sidebar">

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the map with the Philippines as the center
        const map = L.map('map').setView([12.8797, 121.7740], 6); // Center on the Philippines with zoom level 6

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Add a marker (optional)
        const marker = L.marker([14.5995, 120.9842]).addTo(map) // Marker for Manila
            .bindPopup('Manila, Philippines')
            .openPopup();
    </script>
    <script type="module" src="js/book-now.js"></script>

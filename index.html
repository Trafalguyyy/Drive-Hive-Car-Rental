<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vehicle Rental Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<!-- Error Modal -->
<div id="errorModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <p id="modal-message"></p>
    </div>
</div>

<style>
    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
        background-color: white;
        margin: 20% auto;
        padding: 20px;
        border-radius: 8px;
        width: 300px;
        text-align: center;
        position: relative;
    }

    .close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 20px;
        cursor: pointer;
    }
</style>

<body>
    <h1>DRIVE HIVE</h1>
    <div class="background"></div>

    <!-- Movable Car Image -->
    <!-- <div class="image-container" id="movable">
        <p class="drag-text">Drag me!</p>
        <img src="images/car.png" alt="Movable Car">
    </div> -->

    
    <div class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="input-container">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="input-container">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn" onclick="login()">Log In</button>

            <p id="error-message"></p>
        </div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/script.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>  <!-- ✅ Required for Realtime DB -->
<script src="js/firebase-config.js"></script>
<script src="js/script.js"></script>

    

    <script>
        // Drag & Move Image
        const imageContainer = document.getElementById("movable");
        let isDragging = false, offsetX, offsetY;

        // Position the car at the bottom on load
        window.onload = () => {
            imageContainer.style.left = "50%";
            imageContainer.style.top = "80%";
            imageContainer.style.transform = "translate(-50%, -50%)";
        };

        imageContainer.addEventListener("mousedown", (e) => {
            isDragging = true;
            offsetX = e.clientX - imageContainer.offsetLeft;
            offsetY = e.clientY - imageContainer.offsetTop;
            imageContainer.style.cursor = "grabbing";
        });

        document.addEventListener("mousemove", (e) => {
            if (isDragging) {
                imageContainer.style.left = `${e.clientX - offsetX}px`;
                imageContainer.style.top = `${e.clientY - offsetY}px`;
            }
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            imageContainer.style.cursor = "grab";
        });
    </script>
    <script src="navigation.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | Drive Hive</title>
    <link rel="stylesheet" href="bookings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <img src="DriveHivelogo.png" alt="Drive Hive Logo" class="logo">
            <h2 class="sidebar-title">DRIVE HIVE</h2>
            <ul class="nav-links">
                <li class="nav-item" id="dashboard">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </li>
                <li class="nav-item" id="track-cars">
                    <i class="fas fa-map-marker-alt"></i> <span>Track Cars</span>
                </li>
                <li class="nav-item active" id="bookings">
                    <i class="fas fa-calendar-check"></i> <span>Bookings</span>
                </li>
                <li class="nav-item" id="cars">
                    <i class="fas fa-car"></i> <span>Cars</span>
                </li>
                <li class="nav-item" id="users">
                    <i class="fas fa-users"></i> <span>Users</span>
                </li>
                <li class="nav-item" id="settings">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </li>
            </ul>
            <div class="sidebar-profile">
                <div class="avatar">AD</div>
                <div class="profile-details">
                    <span class="name">Admin User</span>
                    <span class="role">System Manager</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="top-bar-left">
                    <div class="breadcrumbs"><a href="dashboard.html">Admin</a> / <span>Bookings</span></div>
                    <h1>Booking Log</h1>
                </div>
            </div>
            
            <div class="bookings-container">
                <div class="table-container">
                    <table class="bookings-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Car</th>
                                <th>Price</th>
                                <th>Date</th>
                                <th>Destination</th>
                                <th>Final Fee</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <tr>
                                <td colspan="6" class="no-data">Loading bookings...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="bookings.js"></script>
</body>
</html>
